<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Monitor & Sync</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 14px;
      margin: 0;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 20px 0;
      color: #333;
    }

    .status {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      color: #666;
      font-weight: 500;
    }

    .status-value {
      color: #333;
      font-weight: 600;
    }

    .enabled {
      color: #4CAF50;
    }

    .disabled {
      color: #f44336;
    }

    .config-section {
      margin-bottom: 20px;
    }

    .config-label {
      display: block;
      margin-bottom: 5px;
      color: #666;
      font-weight: 500;
    }

    .config-input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }

    .config-input:focus {
      outline: none;
      border-color: #4CAF50;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background: #4CAF50;
      color: white;
    }

    .btn-primary:hover {
      background: #45a049;
    }

    .btn-secondary {
      background: #2196F3;
      color: white;
    }

    .btn-secondary:hover {
      background: #0b7dda;
    }

    .btn-danger {
      background: #f44336;
      color: white;
    }

    .btn-danger:hover {
      background: #da190b;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4CAF50;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .message {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 10px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
  </style>
</head>
<body>
  <h1>🔍 Website Monitor & Sync</h1>

  <div id="message" class="message"></div>

  <div class="status">
    <div class="status-row">
      <span class="status-label">Status:</span>
      <span class="status-value" id="statusEnabled">Loading...</span>
    </div>
    <div class="status-row">
      <span class="status-label">History Count:</span>
      <span class="status-value" id="historyCount">0</span>
    </div>
    <div class="status-row">
      <span class="status-label">Last Monitored:</span>
      <span class="status-value" id="lastMonitored">None</span>
    </div>
  </div>

  <div class="config-section">
    <label class="config-label">
      Enable Monitoring
      <label class="toggle-switch">
        <input type="checkbox" id="enabledToggle">
        <span class="slider"></span>
      </label>
    </label>
  </div>

  <div class="config-section">
    <label class="config-label" for="monitorInterval">
      Monitor Interval (seconds)
    </label>
    <input type="number" id="monitorInterval" class="config-input" min="10" max="300" value="30">
  </div>

  <div class="config-section">
    <label class="config-label" for="maxHistory">
      Max History Size
    </label>
    <input type="number" id="maxHistory" class="config-input" min="10" max="1000" value="100">
  </div>

  <div class="config-section">
    <label class="config-label" for="syncServerUrl">
      Sync Server URL
    </label>
    <input type="text" id="syncServerUrl" class="config-input" placeholder="http://localhost:8000/sync">
  </div>

  <div class="button-group">
    <button id="saveBtn" class="btn-primary">Save Config</button>
    <button id="syncBtn" class="btn-secondary">Sync Now</button>
  </div>

  <div class="button-group">
    <button id="clearBtn" class="btn-danger">Clear History</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
